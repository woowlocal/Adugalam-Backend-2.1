# cloudbuild.yaml — placed at the repository root
#
# NO credentials are stored here. All secrets live in Google Secret Manager.
# This file only references secret NAMES, never their VALUES.
# Safe to commit to Git.

substitutions:
  _REGION: asia-south1          # Cloud Run region
  _SERVICE: turf-backend        # Cloud Run service name

steps:
  # ── Step 1: Build the Docker image ──────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build"
    dir: "backend/turf_backend"
    args:
      - build
      - --tag
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_SERVICE/$_SERVICE:$COMMIT_SHA"
      - --tag
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_SERVICE/$_SERVICE:latest"
      - --cache-from
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_SERVICE/$_SERVICE:latest"
      - .

  # ── Step 2: Push both tags to Artifact Registry ─────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push"
    args:
      - push
      - --all-tags
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_SERVICE/$_SERVICE"

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  # All values come from Google Secret Manager (--set-secrets).
  # Secret names are safe to store here; actual values are NOT.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_SERVICE/$_SERVICE:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      # All secrets injected at runtime — values never appear in this file
      - --set-secrets=DB_NAME=db-name:latest,DB_USER=db-user:latest,DB_PASSWORD=db-password:latest,DB_HOST=db-host:latest,SECRET_KEY=django-secret-key:latest,SUPABASE_URL=supabase-url:latest,SUPABASE_KEY=supabase-key:latest,SMTP_HOST=smtp-host:latest,SMTP_USER=smtp-user:latest,SMTP_PASS=smtp-pass:latest,RAZORPAY_KEY_ID=razorpay-key-id:latest,RAZORPAY_KEY_SECRET=razorpay-key-secret:latest,WHATSAPP_API_URL=whatsapp-api-url:latest,WHATSAPP_CLIENT_ID=whatsapp-client-id:latest,WHATSAPP_CLIENT_PASSWORD=whatsapp-client-password:latest,WHATSAPP_FROM_NUMBER=whatsapp-from-number:latest
      # Only truly non-secret static values here (port numbers, flags)
      - --set-env-vars=DB_PORT=6543,SMTP_PORT=587,SMTP_TLS=true,WHATSAPP_USER_ID=3,GCS_BUCKET_NAME=adugalam-media-files

# Push the final tagged image to Artifact Registry
images:
  - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_SERVICE/$_SERVICE:$COMMIT_SHA"
  - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_SERVICE/$_SERVICE:latest"

options:
  logging: CLOUD_LOGGING_ONLY
